<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaratoDoNada</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      color: #94a3b8;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 10px;
    }

    .card {
      background: #111827;
      border-radius: 16px;
      padding: 15px;
      margin: 15px 0;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 12px;
    }

    .title {
      font-size: 16px;
      margin: 10px 0;
    }

    .price {
      color: #22c55e;
      font-size: 18px;
      font-weight: bold;
    }

    .btn {
      display: block;
      margin-top: 10px;
      padding: 12px;
      background: #22c55e;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #16a34a;
    }

    footer {
      margin: 30px 0;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 BaratoDoNada</h1>
  <p>Achados que aparecem do nada</p>
</header>

<div class="container">

  <!-- PRODUTO 1 -->
  <div class="card">
    <img src="https://via.placeholder.com/400x250" alt="Produto">
    <div class="title">Smartwatch com GPS e Música</div>
    <div class="price">💰 R$ 89</div>
    <a class="btn" href="https://meli.la/2zi8jqY" target="_blank">👉 Ver Oferta</a>
  </div>

  <!-- PRODUTO 2 -->
  <div class="card">
    <img src="https://via.placeholder.com/400x250" alt="Produto">
    <div class="title">Fone Bluetooth Sem Fio</div>
    <div class="price">💰 R$ 59</div>
    <a class="btn" href="#" target="_blank">👉 Ver Oferta</a>
  </div>

  <!-- PRODUTO 3 -->
  <div class="card">
    <img src="https://via.placeholder.com/400x250" alt="Produto">
    <div class="title">Air Fryer Promoção</div>
    <div class="price">💰 R$ 299</div>
    <a class="btn" href="#" target="_blank">👉 Ver Oferta</a>
  </div>

</div>

<footer>
  © 2026 BaratoDoNada • Ofertas atualizadas diariamente
</footer>

</body>
</html>
